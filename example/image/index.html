<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Processing — accel-gpu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0d1117; --bg-elevated: #161b22; --border: #30363d; --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff; }
    * { box-sizing: border-box; }
    body { font-family: "IBM Plex Sans", sans-serif; margin: 0; padding: 2rem; background: var(--bg); color: var(--text); }
    .wrap { max-width: 900px; margin: 0 auto; }
    .back { margin-bottom: 1.5rem; }
    .back a { color: var(--text-muted); text-decoration: none; }
    .back a:hover { color: var(--accent); }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: var(--text-muted); margin: 0 0 1.5rem; }
    .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
    .controls label { display: flex; align-items: center; gap: 0.5rem; }
    .controls input[type="range"] { width: 120px; }
    .canvas-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .canvas-box { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem; }
    .canvas-box h3 { font-size: 0.85rem; margin: 0 0 0.5rem; font-weight: 500; color: var(--text-muted); }
    .canvas-box canvas { display: block; max-width: 100%; border-radius: 4px; }
    .status { font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem; }
    input[type="file"] { display: none; }
    .btn { padding: 0.5rem 1rem; background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 0.9rem; }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="back"><a href="../../">← Docs Home</a> · <a href="../../guide/quickstart">Quick Start</a> · <a href="../../demos">Demos Hub</a></div>
    <h1>Image Processing</h1>
    <p>Upload an image and apply GPU-accelerated filters: brightness, contrast, invert.</p>

    <div class="controls">
      <button class="btn" id="uploadBtn">Upload Image</button>
      <input type="file" id="fileInput" accept="image/*">
      <label>Brightness: <input type="range" id="brightness" min="0" max="2" step="0.1" value="1"></label>
      <label>Contrast: <input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1"></label>
      <label><input type="checkbox" id="invert"> Invert</label>
    </div>

    <div class="canvas-row">
      <div class="canvas-box">
        <h3>Original</h3>
        <canvas id="original" width="256" height="256"></canvas>
      </div>
      <div class="canvas-box">
        <h3>Processed</h3>
        <canvas id="processed" width="256" height="256"></canvas>
      </div>
    </div>
    <p class="status" id="status">Loading…</p>
  </div>

  <script type="module">
    import { init } from "../../dist/index.js";

    const original = document.getElementById("original");
    const processed = document.getElementById("processed");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const brightness = document.getElementById("brightness");
    const contrast = document.getElementById("contrast");
    const invert = document.getElementById("invert");
    const status = document.getElementById("status");

    let gpu = null;
    let currentImageData = null;

    uploadBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const img = new Image();
      img.onload = async () => {
        original.width = img.width;
        original.height = img.height;
        original.getContext("2d").drawImage(img, 0, 0);
        currentImageData = original.getContext("2d").getImageData(0, 0, img.width, img.height);
        await processImage();
      };
      img.src = URL.createObjectURL(file);
    });

    const update = () => { if (currentImageData) processImage(); };
    brightness.addEventListener("input", update);
    contrast.addEventListener("input", update);
    invert.addEventListener("change", update);

    async function processImage() {
      if (!currentImageData || !gpu) return;
      status.textContent = "Processing…";
      try {
        const w = currentImageData.width;
        const h = currentImageData.height;
        const arr = gpu.fromImageData(currentImageData);

        const b = parseFloat(brightness.value);
        const c = parseFloat(contrast.value);
        const doInvert = invert.checked;

        await arr.sub(0.5);
        await arr.mul(c);
        await arr.add(0.5);
        await arr.mul(b);
        if (doInvert) {
          await arr.neg();
          await arr.add(1);
        }

        const canvas = await gpu.toCanvas(arr, w, h);
        processed.width = w;
        processed.height = h;
        processed.getContext("2d").drawImage(canvas, 0, 0);
        status.textContent = `Backend: ${gpu.backendType} — ${w}×${h} processed`;
      } catch (err) {
        status.textContent = "Error: " + err.message;
        status.style.color = "#f85149";
      }
    }

    (async () => {
      gpu = await init();
      status.textContent = "Ready. Upload an image or use default.";
      const img = new Image();
      img.onload = async () => {
        original.width = img.width;
        original.height = img.height;
        original.getContext("2d").drawImage(img, 0, 0);
        currentImageData = original.getContext("2d").getImageData(0, 0, img.width, img.height);
        await processImage();
      };
      img.src = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs><rect fill="url(#g)" width="256" height="256"/><circle fill="%233fb950" cx="128" cy="128" r="60" opacity="0.9"/></svg>');
    })();
  </script>
</body>
</html>
