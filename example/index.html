<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>accel-gpu Demo</title>
</head>
<body>
  <h1>accel-gpu Demo</h1>
  <pre id="output">Loading...</pre>

  <script type="module">
    import { init, matmul, softmax } from "https://esm.sh/accel-gpu";

    async function run() {
      const output = document.getElementById("output");
      try {
        const gpu = await init();
        output.textContent = `Backend: ${gpu.backendType}\n\n`;

        // Add
        const a = gpu.array(new Float32Array([1, 2, 3, 4]));
        const b = gpu.array(new Float32Array([5, 6, 7, 8]));
        await a.add(b);
        output.textContent += `Add: [1,2,3,4] + [5,6,7,8] = ${await a.toArray()}\n`;

        // Sum
        const sum = await gpu.array(new Float32Array([1, 2, 3, 4])).sum();
        output.textContent += `Sum: [1,2,3,4] = ${sum}\n`;

        // Matmul (shape inference)
        const A = gpu.array(new Float32Array([1, 2, 3, 4, 5, 6]), [2, 3]);
        const B = gpu.array(new Float32Array([1, 2, 3, 4, 5, 6]), [3, 2]);
        const C = await matmul(gpu, A, B);
        output.textContent += `Matmul (2x3 @ 3x2) = ${await C.toArray()}\n`;

        // Softmax (shape inference)
        const logits = gpu.array(new Float32Array([1, 2, 3, 4]));
        const probs = await softmax(gpu, logits);
        output.textContent += `Softmax([1,2,3,4]) = ${(await probs.toArray()).map(x => x.toFixed(4)).join(", ")}\n`;

        output.textContent += "\nAll tests passed!";
      } catch (err) {
        output.textContent = "Error: " + err.message + "\n\n" + err.stack;
      }
    }
    run();
  </script>
</body>
</html>
