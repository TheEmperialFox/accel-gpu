<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@accel/gpu Playground</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: "JetBrains Mono", monospace; margin: 0; padding: 1rem; background: #1e1e1e; color: #d4d4d4; }
    .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    h1 { color: #4ec9b0; margin-top: 0; }
    textarea { width: 100%; height: 300px; padding: 1rem; background: #252526; border: 1px solid #3c3c3c; color: #d4d4d4; font-family: inherit; font-size: 14px; border-radius: 4px; resize: vertical; }
    pre { background: #252526; padding: 1rem; border-radius: 4px; overflow: auto; max-height: 300px; margin: 0; }
    button { padding: 0.5rem 1rem; background: #0e639c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1177bb; }
    .output { color: #9cdcfe; }
    .error { color: #f48771; }
    label { display: block; margin-bottom: 0.5rem; color: #808080; }
  </style>
</head>
<body>
  <h1>@accel/gpu Playground</h1>
  <p>Edit the code and click Run. Uses live ESM from dist.</p>
  <div class="container">
    <div>
      <label>Code</label>
      <textarea id="code">const gpu = await init();
const a = gpu.array([1, 2, 3, 4]);
const b = gpu.array([5, 6, 7, 8]);
await a.add(b);
console.log(await a.toArray());

// Shape inference
const A = gpu.array(new Float32Array([1,2,3,4,5,6]), [2, 3]);
const B = gpu.array(new Float32Array([1,2,3,4,5,6]), [3, 2]);
const C = await matmul(gpu, A, B);
console.log("matmul:", await C.toArray());

// Method chaining
const x = gpu.array([1, 2, 3, 4]);
await x.add(1).mul(2);
console.log("chain:", await x.toArray());</textarea>
      <button id="run">Run</button>
    </div>
    <div>
      <label>Output</label>
      <pre id="output">Click Run to execute.</pre>
    </div>
  </div>

  <script type="module">
    import { init, matmul, softmax, layerNorm } from "../dist/index.js";

    const codeEl = document.getElementById("code");
    const outputEl = document.getElementById("output");
    const runBtn = document.getElementById("run");

    const logs = [];
    const originalLog = console.log;
    console.log = (...args) => {
      logs.push(args.map((a) => (typeof a === "object" ? JSON.stringify(a) : String(a))).join(" "));
      originalLog.apply(console, args);
    };

    runBtn.onclick = async () => {
      logs.length = 0;
      outputEl.innerHTML = "";
      outputEl.classList.remove("error");

      try {
        const AsyncFunction = (async function () {}).constructor;
        const fn = new AsyncFunction("init", "matmul", "softmax", "layerNorm", codeEl.value);
        await fn(init, matmul, softmax, layerNorm);
        outputEl.textContent = logs.length ? logs.join("\n") : "No output.";
        outputEl.classList.add("output");
      } catch (e) {
        outputEl.textContent = e.message + "\n\n" + e.stack;
        outputEl.classList.add("error");
      }
    };
  </script>
</body>
</html>
